    <style>

<body class="bg-bg text-[#EDEDED] font-montserrat antialiased min-h-screen">

        </p>

                            <path stroke-linecap="round" stroke-linejoin="round" d="M22 16.92v3a2 2 0 0 1-2.18 2A19.72 19.72 0 0 1 3.09 5.18 2 2 0 0 1 5 3h3a2 2 0 0 1 2 1.72c.13 1.05.37 2.07.72 3.06a2 2 0 0 1-.45 2.11l-1.27 1.27a16 16 0 0 0 6.29 6.29l1.27-1.27a2 2 0 0 1 2.11-.45c.99.35 2.01.59 3.06.72A2 2 0 0 1 22 16.92z" />
                        </svg>

    <script>
        const menuData = [
            { category: 'meze', name: 'Meze Çeşitleri', desc: 'Günlük taze mezeler', price: 240, img: 'photo-1619941862585-cd4fa9a4c2cb' },
            { category: 'meze', name: 'Dil Beyin', desc: 'Özel sosu ile', price: 600, img: 'photo-1542528180-0c79567c66de' },
            { category: 'meze', name: 'Mantar', desc: 'Tereyağında kaşarlı', price: 150, img: 'photo-1620041328526-d0cf044a0739' },
            { category: 'meze', name: 'Paçanga', desc: 'Bol malzemeli çıtır çıtır', price: 210, img: 'photo-1743674453093-592bed88018e' },
            { category: 'meze', name: 'Sıcak Ot', desc: 'Ege otları harmanı', price: 350, img: 'photo-1542528406-f04308dcf0a1' },
            { category: 'meze', name: 'Peynir', desc: 'Ezine tam yağlı', price: 130, img: 'photo-1653418622353-e9f40f9aef00' },
            { category: 'meze', name: 'Salata', desc: 'Sumaklı, narlı mevsim salatası', price: 250, img: 'photo-1542444256-9dd3e45c9b81' },

            { category: 'izgara', name: 'Yaprak Ciğer', desc: 'Ustanın efsane reçetesi', price: 600, img: 'photo-1684864115205-242c064363e6' },
            { category: 'izgara', name: 'Köfte', desc: 'Kasap usulü ızgara', price: 200, img: 'photo-1555939594-58d7cb561ad1' },
            { category: 'izgara', name: 'Adana', desc: 'Zırh kıyması, hafif acılı', price: 600, img: 'photo-1603360946369-dc9bb6258143' },
            { category: 'izgara', name: 'Pirzola', desc: 'Süt kuzu pirzola', price: 350, img: 'photo-1633436375795-12b3b339712f' },
            { category: 'izgara', name: 'Çöp Şiş', desc: 'Lokum gibi yumuşak', price: 650, img: 'photo-1532636875304-0c89119d9b4d' },
            { category: 'izgara', name: 'Lokum', desc: 'Özel dinlendirilmiş antrikot', price: 650, img: 'photo-1599487488170-d11ec9c172f0' },

            { category: 'icecek', name: 'Meşrubat', desc: 'Kutu içecek çeşitleri', price: 100, img: 'photo-1696739696220-8d2e27465662' },
            { category: 'icecek', name: 'Su', desc: 'Cam şişe', price: 50, img: 'photo-1523362628745-0c100150b504' },
        ];

        let activeCategory = 'meze';

        const grid = document.getElementById('menuGrid');
        const noResults = document.getElementById('noResults');
        const searchInput = document.getElementById('searchInput');
        const categoryBar = document.getElementById('categoryBar');

        function imgUrl(id) {
            return `https://images.unsplash.com/${id}?w=800&h=800&fit=crop&q=80&auto=format`;
        }

        function trLower(str) {
            return str.replace('İ', 'i').replace('I', 'ı').toLowerCase();
        }

        function cardTemplate(item, i) {
            return `
                            <div class="menu-card flex flex-row items-center bg-[#181818] hover:bg-[#202020] transition-colors duration-300 rounded-2xl p-5 border border-white/5 justify-between gap-4 sm:gap-5" style="animation-delay:${i * 50}ms">
                                <div class="card-text flex-1 min-w-0 pr-2">
                                    <h3 class="font-playfair font-bold text-base text-white leading-snug truncate">${item.name}</h3>
                                    <p class="card-desc text-[11px] text-gray-400 mt-1.5 leading-relaxed truncate">${item.desc}</p>
                                    <p class="card-price font-playfair font-extrabold text-lg mt-3.5 tracking-wide" style="color:#D4AF37; text-shadow:0 0 10px rgba(212,175,55,.22);">${item.price} ₺</p>
                                </div>
                                <div class="card-img-wrap flex items-center justify-end shrink-0">
                                    <div class="card-img w-28 h-28 sm:w-32 sm:h-32 rounded-2xl overflow-hidden bg-black/30 ring-1 ring-white/5 ml-1">
                                        <img src="${imgUrl(item.img)}" alt="${item.name}" loading="lazy" class="w-full h-full object-cover">
                                    </div>
                                </div>
                            </div>
                        `;
        }

        function renderMenu() {
            const term = trLower(searchInput.value.trim());
            const filtered = menuData.filter(item =>
                item.category === activeCategory &&
                (trLower(item.name).includes(term) || trLower(item.desc).includes(term))
            );

            grid.innerHTML = filtered.map((item, i) => cardTemplate(item, i)).join('');
            noResults.classList.toggle('hidden', filtered.length > 0);
        }

        categoryBar.addEventListener('click', (e) => {
            const btn = e.target.closest('.cat-btn');
            if (!btn) return;
            activeCategory = btn.dataset.cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
            renderMenu();
        });

        searchInput.addEventListener('input', renderMenu);

        renderMenu();
    </script>
